version: "3.9"
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: kaspi
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
  app:
    build: .
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: kaspi
      DB_USER: postgres
      DB_PASSWORD: postgres
      EXPORT_DIR: /app/export
      LOG_DIR: /app/logs
    depends_on:
      - db
    ports:
      - "8000:8000"
    volumes:
      - ./:/app
volumes:
  db_data:
